name: DeterministicNode
criticality: TRUNK-CRITICAL

purpose: |
  Non-LLM behaviour for deterministic topology nodes. A det-node is a
  uniform Node whose kind is START/END/USER (NodeKind); its behaviour class
  (StartNode/EndNode/UserNode) is selected from kind via the single-sourced
  NODE_KIND_BEHAVIOUR registry and materialized at the analyzer seam — det-
  node *instances* are never stored in Topology.nodes. Det-nodes drive
  workflow entry, exit, and bidirectional human Q&A, and interact with the
  orchestrator only through the narrow DetNodeContext Protocol.

members:
  - StartNode (workflow entry; required, exactly one per topology)
  - EndNode (workflow exit; optional, zero or more)
  - UserNode (bidirectional human Q&A; optional, zero or more, FIFO single-pending)

responsibilities:
  - Provide explicit, deterministic behavior at workflow entry, exit, and human-interaction points
  - Implement three lifecycle hooks per subclass: on_workflow_start, on_single_invoke, on_dispatch
  - Drive coordination tool gating via topology edges (has_edge_to_endnode, has_edge_to_usernode)
  - Map NodeKind -> behaviour class via the single authoritative NODE_KIND_BEHAVIOUR registry (RESERVED_NAME_TO_KIND, the reserved-name->kind lookup, is derived from it — no second hand-maintained spelling)

not_responsible_for:
  - Branch / Barrier state mutation — owned by Orchestrator
  - LLM execution — det-nodes never make model calls
  - User I/O specifics — UserNode delegates to a bound UserNodeHandler

design_principles:
  - DP-003 (interact with the orchestrator's Branch / Barrier graph through DetNodeContext)
  - DP-005 (topology-driven: outgoing edges to det-nodes drive coordination tool gating)

relationships:
  called_by:
    - Orchestrator (via DetNodeContext Protocol)
  calls:
    - DetNodeContext methods (deliver, deliver_to_root, dispatch_to_root, spawn_branch_at, enqueue_user_interaction, fail)
  never_calls:
    - Agent / model APIs
    - Branch / Barrier state directly (only via DetNodeContext)

boundaries:
  add_here:
    - New det-node kind (add a NodeKind member; subclass DeterministicNode; add one NODE_KIND_BEHAVIOUR entry; implement the three lifecycle hooks). Extension-open — no dispatch-site edits, no RESERVED_DETNODE_NAMES (removed; collapsed into NODE_KIND_BEHAVIOUR)
    - New DetNodeContext methods if a new det-node type needs them (added to the Protocol so all implementers stay in sync)
  not_here:
    - LLM calls
    - Direct manipulation of Branch / Barrier dicts (use DetNodeContext only)
    - Topology graph mutation (det-nodes are registered via topology.register_det_node, not via the Orchestrator)

invariants:
  - Exactly one StartNode per topology (the only enforced singleton); EndNode and UserNode are optional, zero or more.
  - StartNode.on_workflow_start dispatches to all outgoing edges with delivery_target = ROOT.
  - StartNode.on_single_invoke / on_dispatch raise (Start cannot be invoked from agents).
  - EndNode.on_single_invoke calls deliver_to_root (branch terminates, value -> ROOT).
  - EndNode.on_dispatch calls dispatch_to_root (fire-and-forget, fork doesn't wait for ROOT).
  - UserNode FIFO single-pending: at most one user question outstanding; siblings queue.
  - Reserved names "Start", "End", "User" auto-resolve in parse_node to a uniform Node(kind=START/END/USER) via RESERVED_NAME_TO_KIND (derived from NODE_KIND_BEHAVIOUR); the behaviour instance is materialized later at analyzer._add_nodes, never placed in Topology.nodes.

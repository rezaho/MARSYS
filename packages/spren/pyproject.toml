[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "spren"
version = "0.3.0"
description = "MARSYS Spren — local-first OSS personal AI assistant on top of the marsys framework."
readme = "README.md"
requires-python = ">=3.12"
license = {text = "FSL-1.1-ALv2"}
authors = [{name = "Reza Hosseini", email = "reza@marsys.ai"}]
dependencies = [
    "marsys",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.11",
    "click>=8.1",
    "platformdirs>=4.2",
    "python-dotenv>=1.0",
    "python-ulid>=3.0,<4.0",
    "python-multipart>=0.0.20",
    "sse-starlette>=2.1",
]

[project.optional-dependencies]
test = [
    "pytest>=8.4",
    "pytest-asyncio>=1.0",
    "httpx>=0.27",
]
aggui = [
    "marsys[aggui]",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
spren = ["_webui/**/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.uv.sources]
marsys = { workspace = true }
